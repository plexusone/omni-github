site_name: Omni-GitHub
site_description: GitHub providers and skills for the PlexusOne ecosystem
site_url: https://plexusone.github.io/omni-github
repo_url: https://github.com/plexusone/omni-github
repo_name: plexusone/omni-github

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Storage Provider:
      - Overview: omnistorage/overview.md
      - Configuration: omnistorage/configuration.md
      - Batch Operations: omnistorage/batch-operations.md
  - Skills:
      - Overview: omniskill/overview.md
      - GitHub Skill: omniskill/github.md
  - DevX Collector:
      - Overview: omnidevx/overview.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/omni-github
  - Releases:
      - v0.5.0: releases/v0.5.0.md
      - v0.4.0: releases/v0.4.0.md
      - v0.3.0: releases/v0.3.0.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omni-github
